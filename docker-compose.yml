version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cip_postgres
    environment:
      POSTGRES_USER: cip
      POSTGRES_PASSWORD: cip_dev_password
      POSTGRES_DB: cip
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cip"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cip_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://cip:cip_dev_password@postgres:5432/cip
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cip_frontend
    environment:
      VITE_API_URL: ""
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  pgdata:
